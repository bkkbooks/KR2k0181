body:
  text: 武陵記後漢書章懷太子賢注引三事山高可萬仞山半有槃瓠石室可容數萬人中有石床槃瓠行跡今案山窟前有石羊石獸古跡奇異尤多望石窟大如三閒屋遙見一石仍似狗形蠻俗相傳云是槃瓠象也南蠻傳注壺頭山邊有石窟即援所穿室也室內有蛇如百斛船大云是援之餘靈竇融傳注御覽卷四十九此山頭與東海方壺山相似神仙所游集因名壺頭山也同上北堂書鈔引三事有緑欏山側巖垂水懸蘿釣流又有明月池碧潭鏡徹百丈見底土人為之歌曰仰茲山兮迢迢層石搆兮嵯峨樂茲潭兮安流緩子櫂兮詠歌卷一百六緑蘿山素崖若披雲寒松柘翠流風叩柯則有宮商之韻卷一百五十一武陵有一孤嶺上有一池水數畝魚鱉無不備有其七月七日皆出遊嶺巔類族各別卷一百五十五初學記引二事謝承為武陵郡守時有黃龍見於郡東水中拜表上賀因號龍池卷八風門山有石門去地百餘丈將欲風起此門隱隱有黑氣上須臾有黑風起卷八太平御覽引十六事武山高可萬仞山半有盤瓠石窟中有一石狗形云是盤瓠之遺像又有班蛇四眼身大十圍山有水出謂之武溪是也在縣之西卷四十九天門山山上有葱如人所種畦隴成行人欲取之先禱山神乃取氣味甚美不然不可得崖中有書數十卷人可見而不可取卷四十九昔有臨沅黃道真住黃聞山釣魚因入桃花源陶潛有桃花源記今山下有潭名黃聞此蓋聞道真所說遂為其名也卷四十九風門山有石門去地百餘丈每欲風起此門先有黑氣若烟隱而上斯須風起竟入卷四十九石帆山危起若數百幅帆形卷四十九虎齒山形如虎民嘗六月祭之不然輒有虎害卷四十九移山在汧陽界本在江北岸因風雨之勢一夕移渡江南岸後以此名之卷四十九淳于山與雉山相近在辰州武陵二郡界絶壑之半有一白雉遠望首尾可二丈伸足翔翼若虛中翻飛即上視之乃有一石雉舒趐綴著石上山下有石室數畝望室裏雖暗猶見銅鐘高丈餘十枚其色甚光明卷四十九武陵山中有秦避世人居之尋水號曰桃花源故陶潛有桃花源記又曰山上有神母祠卷四十九有湖名為丹陂周圍數百頃青波澄映洲嶼相望卷六十六後漢梁松自義武陵移郡於若城今州東有張若城卷一百六十八武陵郡境四千餘里卷一百六十八山邊有石窟即馬援所穿屋也室內有大蛇如舟云是援之餘靈卷一百七十一此山頭與東海方壺山相似因名壺頭卷一百七十四有緑羅山側岩垂水縣蘿百里許得明月池碧潭鏡徹百尺見底素岩若雪松如插翠流風叩阿有絲桐之韻土人為之歌曰仰茲山兮迢迢層石搆兮嵯峨朝日麗兮陽岩落景梁兮陰阿彰壑兮生音吟籟兮相和敷芳兮緑林恬淡兮潤波樂茲潭兮安流緩櫂兮咏歌卷五百七十二
